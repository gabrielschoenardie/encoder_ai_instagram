name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analysing the code with pylint
      # import-error is pure CI noise here: this job installs only pylint (not the
      # project's third-party deps), so every external import would otherwise raise
      # E0401 (weighted 5x) and sink the score. fail-fast:false lets each Python
      # version report independently instead of one cancelling the others.
      run: |
        pylint $(git ls-files '*.py') --fail-under=8.0 --disable=import-error
